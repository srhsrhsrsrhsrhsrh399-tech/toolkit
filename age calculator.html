<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Calculator</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

body {
    font-family: 'Orbitron', sans-serif;
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a18cd1, #fbc2eb);
    height: 100vh;
    overflow: hidden;
}

/* FLOATING BACKGROUND */
.floating-bg {
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    z-index: 0;
}

.floating-bg span {
    position: absolute;
    color: rgba(255,255,255,0.25);
    font-size: 18px;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    0% {
        transform: translateY(100vh);
        opacity: 0;
    }
    20% { opacity: 1; }
    100% {
        transform: translateY(-10vh);
        opacity: 0;
    }
}

/* CARD */
.calculator {
    position: relative;
    z-index: 2;
    margin: auto;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.3);
    border-radius: 25px;
    padding: 40px 30px;
    width: 380px;
    text-align: center;
    box-shadow: 0 0 40px #fff, 0 0 80px #ff6a00, 0 0 120px #ee0979;
}

/* LOGO */
.logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 25px;
}

.logo-icon {
    font-size: 35px;
    animation: pulse 1.5s infinite;
}

.logo-text {
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 2px;
    text-shadow: 0 0 10px #00fff7, 0 0 20px #ff6a00;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

/* INPUTS */
.input-boxes select {
    width: 30%;
    padding: 10px;
    margin: 0 5px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    background: rgba(0,0,0,0.6);
    color: #00ffff;
    text-align: center;
}

/* BUTTON */
button {
    margin-top: 20px;
    padding: 12px 30px;
    font-size: 16px;
    border-radius: 12px;
    border: none;
    color: #fff;
    cursor: pointer;
    background: linear-gradient(90deg, #ff6a00, #ee0979);
    box-shadow: 0 0 15px #ff6a00;
}

button:hover {
    transform: scale(1.05);
}

/* RESULT */
.result {
    display: flex;
    justify-content: space-around;
    margin-top: 25px;
}

.result div {
    flex: 1;
    margin: 5px;
    padding: 15px 0;
    border-radius: 12px;
    background: rgba(0,0,0,0.6);
    text-align: center;
}

.result span {
    font-size: 24px;
    color: #fff;
}

.result small {
    color: #ccc;
}
</style>
</head>

<body>

<!-- FLOATING BACKGROUND -->
<div class="floating-bg" id="floating-bg"></div>

<!-- MAIN CARD -->
<div class="calculator">

    <div class="logo">
        <div class="logo-icon">⏳</div>
        <div class="logo-text">AGE CALCULATOR</div>
    </div>

    <div class="input-boxes">
        <select id="day"><option value="">Day</option></select>
        <select id="month"><option value="">Month</option></select>
        <select id="year"><option value="">Year</option></select>
    </div>

    <button onclick="calculateAge()">Calculate</button>

    <div class="result" id="result" style="display:none;">
        <div><span id="years">0</span><br><small>Years</small></div>
        <div><span id="months">0</span><br><small>Months</small></div>
        <div><span id="days">0</span><br><small>Days</small></div>
    </div>

</div>

<script>
// FLOATING ELEMENTS
const bg = document.getElementById("floating-bg");
const items = ["⏳","🎂","⌛","18","21","25","30","40"];

function createItem(){
    const span = document.createElement("span");
    span.innerText = items[Math.floor(Math.random()*items.length)];

    span.style.left = Math.random()*100 + "vw";
    span.style.fontSize = (14 + Math.random()*20) + "px";
    span.style.animationDuration = (6 + Math.random()*6) + "s";

    bg.appendChild(span);

    setTimeout(()=> span.remove(), 12000);
}

setInterval(createItem, 500);

// DROPDOWNS
const day = document.getElementById("day");
const month = document.getElementById("month");
const year = document.getElementById("year");

for(let i=1;i<=31;i++) day.innerHTML += `<option value="${i}">${i}</option>`;
const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
monthNames.forEach((name, index) => {
    month.innerHTML += `<option value="${index+1}">${name}</option>`;
});
for(let i=new Date().getFullYear();i>=1900;i--) year.innerHTML += `<option value="${i}">${i}</option>`;

// AGE CALC
function calculateAge(){
    let d = parseInt(day.value);
    let m = parseInt(month.value);
    let y = parseInt(year.value);

    if(!d || !m || !y){
        alert("Select full date");
        return;
    }

    let today = new Date();

    let years = today.getFullYear() - y;
    let months = today.getMonth() - (m-1);
    let days = today.getDate() - d;

    if(days < 0){
        months--;
        days += 30;
    }

    if(months < 0){
        years--;
        months += 12;
    }

    document.getElementById("years").innerText = years;
    document.getElementById("months").innerText = months;
    document.getElementById("days").innerText = days;

    document.getElementById("result").style.display = "flex";
}
</script>

</body>
</html>
