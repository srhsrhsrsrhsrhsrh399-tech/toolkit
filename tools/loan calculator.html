
<!DOCTYPE html>
<html>
<head>
<title>Loan Calculator</title>
<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg,#4facfe,#00f2fe);
  overflow: hidden;
  position: relative;
}

/* Floating Background Logos */
.bg-logo {
  position: absolute;
  opacity: 0.2;
  animation: floatAnim linear infinite;
  text-shadow: 0 0 10px #fff, 0 0 20px #36d1dc, 0 0 30px #5b86e5;
}

@keyframes floatAnim {
  0% { transform: translateY(100vh) rotate(0deg) scale(0.5); opacity:0; }
  50% { opacity:0.5; }
  100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity:0; }
}

/* Calculator Box */
.box {
  width: 360px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
  text-align: center;
  color: white;
  position: relative;
  z-index: 10;
}

/* Logo & Labels */
.logo {
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 20px;
  color: #00f2fe;
  text-shadow: 0 0 10px rgba(0,242,254,0.7);
}

.premium-logo {
  font-weight: 500;
  display: inline-block;
  color: #00eaff;
  text-shadow: 0 0 10px #00eaff, 0 0 20px #36d1dc, 0 0 30px #5b86e5;
  animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
  0% { transform: scale(1);}
  50% { transform: scale(1.1);}
  100% { transform: scale(1);}
}

/* Inputs */
input, select {
  width: 90%;
  padding: 12px;
  margin: 8px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.08);
  color: white;
  outline: none;
}

select option { color: black; background: white; }
input::placeholder { color: #ccc; }

button {
  width: 95%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg,#36d1dc,#5b86e5);
  color: white;
  cursor: pointer;
}

.result {
  display:none;
  margin-top:15px;
  padding:15px;
  background: rgba(255,255,255,0.1);
  border-radius:10px;
}

.show { display:block; }
</style>
</head>
<body>

<!-- Dense Floating Logos -->
<script>
const logos = ['💎','🏆','✨','💰','🎖️'];
for(let i=0;i<30;i++){
  const span = document.createElement('span');
  span.className = 'bg-logo';
  span.innerText = logos[Math.floor(Math.random()*logos.length)];
  span.style.left = Math.random()*100 + '%';
  span.style.fontSize = 15 + Math.random()*25 + 'px';
  span.style.animationDuration = 8 + Math.random()*12 + 's';
  document.body.appendChild(span);
}
</script>

<div class="box">
  <div class="logo">💰 Loan Calculator</div>

  <span class="label"><span class="premium-logo">Amount ₹</span></span>
  <input type="number" id="amount" placeholder="Enter amount">

  <span class="label"><span class="premium-logo">Interest %</span></span>
  <input type="number" id="rate" placeholder="Enter interest rate">

  <span class="label"><span class="premium-logo">Rate Type</span></span>
  <select id="rateType">
    <option value="yearly">Per Year</option>
    <option value="monthly">Per Month</option>
  </select>

  <span class="label"><span class="premium-logo">Years</span></span>
  <input type="number" id="years" placeholder="Years">

  <span class="label"><span class="premium-logo">Months</span></span>
  <input type="number" id="months" placeholder="Months">

  <button onclick="calculate()">Calculate</button>

  <div id="result" class="result"></div>
</div>

<script>
function calculate(){
  let P = parseFloat(document.getElementById("amount").value);
  let rate = parseFloat(document.getElementById("rate").value);
  let type = document.getElementById("rateType").value;
  let years = parseInt(document.getElementById("years").value)||0;
  let months = parseInt(document.getElementById("months").value)||0;
  let t = years*12 + months;
  let result = document.getElementById("result");

  if(!P || !rate || t<=0){
    result.innerHTML="⚠️ Fill correct data";
    result.classList.add("show");
    return;
  }

  let r = type==="yearly" ? rate/12 : rate;
  let interest = (P*r*t)/100;
  let total = P + interest;

  result.innerHTML = `
  <b>Total:</b> ₹ ${total.toFixed(2)}<br><br>
  <b>Interest:</b> ₹ ${interest.toFixed(2)}
  `;

  result.classList.add("show");
}
</script>
</body>
</html>
